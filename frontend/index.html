<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Media Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <style>
        body { background: #0f0f0f; }
        .plyr { border-radius: 12px; overflow: hidden; }
        .result-card:hover { background: #1a1a1a; transform: translateY(-2px); }
        .result-card { transition: all 0.2s; }
        .source-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .youtube { background: #ff0000; }
        .bilibili { background: #00a1d6; }
        .netease { background: #c20c0c; }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="container mx-auto px-4 py-6">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">Web Media Player</h1>
        </div>

        <!-- Search Section -->
        <div class="max-w-3xl mx-auto mb-6">
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="搜索视频/音乐..." class="flex-1 px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 focus:border-purple-500 focus:outline-none text-white">
                <button onclick="search()" id="searchBtn" class="px-6 py-3 bg-purple-600 hover:bg-purple-700 rounded-lg font-medium">搜索</button>
            </div>
            <div class="flex gap-4 mt-2 text-sm text-gray-400">
                <label><input type="radio" name="source" value="all" checked class="mr-1"> 全部</label>
                <label><input type="radio" name="source" value="youtube" class="mr-1"> YouTube</label>
                <label><input type="radio" name="source" value="bilibili" class="mr-1"> B站</label>
                <label><input type="radio" name="source" value="netease" class="mr-1"> 网易云</label>
            </div>
        </div>

        <!-- Main Content -->
        <div class="max-w-3xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-4">
            <!-- Player -->
            <div class="bg-gray-900 rounded-xl p-3">
                <div id="playerWrapper" class="aspect-video bg-black rounded-lg flex items-center justify-center">
                    <div class="text-gray-500 text-center">
                        <p class="text-3xl mb-1">▶</p>
                        <p class="text-sm">搜索或粘贴链接播放</p>
                    </div>
                </div>
                <div id="mediaInfo" class="mt-2 hidden">
                    <h2 id="mediaTitle" class="text-sm font-semibold truncate"></h2>
                </div>
            </div>

            <!-- Results -->
            <div class="bg-gray-900 rounded-xl p-3 max-h-96 overflow-y-auto">
                <h3 class="text-sm font-semibold mb-2 text-gray-400">搜索结果</h3>
                <div id="results" class="space-y-2">
                    <p class="text-gray-500 text-sm">输入关键词搜索</p>
                </div>
            </div>
        </div>

        <!-- Direct URL Input -->
        <div class="max-w-3xl mx-auto mt-4">
            <div class="flex gap-2">
                <input type="text" id="urlInput" placeholder="或直接粘贴视频/音乐链接" class="flex-1 px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm">
                <button onclick="playUrl()" id="playBtn" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg text-sm">播放链接</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let player = null;
        
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') search(); });
        document.getElementById('urlInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') playUrl(); });

        async function search() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            
            const source = document.querySelector('input[name="source"]:checked').value;
            const btn = document.getElementById('searchBtn');
            btn.disabled = true; btn.textContent = '搜索中...';
            
            try {
                const res = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(q)}&source=${source}`);
                const data = await res.json();
                renderResults(data.results);
            } catch (e) { alert('搜索失败: ' + e.message); }
            finally { btn.disabled = false; btn.textContent = '搜索'; }
        }

        function renderResults(results) {
            const container = document.getElementById('results');
            if (!results.length) {
                container.innerHTML = '<p class="text-gray-500 text-sm">未找到结果</p>';
                return;
            }
            
            container.innerHTML = results.map(item => `
                <div class="result-card flex gap-2 p-2 rounded-lg cursor-pointer" onclick="playSearchResult('${item.url}', '${item.title.replace(/'/g, "\\'")}')">
                    <img src="${item.thumbnail || ''}" class="w-20 h-12 object-cover rounded bg-gray-800 flex-shrink-0" onerror="this.style.display='none'">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate">${item.title}</p>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="source-badge ${item.source}">${item.source}</span>
                            <span class="text-xs text-gray-500">${item.duration || ''}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function playSearchResult(url, title) {
            document.getElementById('urlInput').value = url;
            await playUrl();
        }

        async function playUrl() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            
            const btn = document.getElementById('playBtn');
            btn.disabled = true; btn.textContent = '加载中...';
            
            try {
                const res = await fetch(`${API_BASE}/api/extract?url=${encodeURIComponent(url)}&format=best`);
                const data = await res.json();
                if (data.detail) throw new Error(data.detail);
                
                const playUrl = data.direct_url || data.audio_url || (data.formats && data.formats[0]?.url);
                if (!playUrl) throw new Error('无法获取播放链接');
                
                createPlayer(playUrl);
                document.getElementById('mediaInfo').classList.remove('hidden');
                document.getElementById('mediaTitle').textContent = data.title;
            } catch (e) { alert('播放失败: ' + e.message); }
            finally { btn.disabled = false; btn.textContent = '播放链接'; }
        }

        function createPlayer(url) {
            document.getElementById('playerWrapper').innerHTML = '<video id="player" playsinline controls style="width:100%;height:100%"></video>';
            const video = document.getElementById('player');
            
            if (url.includes('.m3u8') && typeof Hls !== 'undefined' && Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
            } else { video.src = url; }
            
            player = new Plyr(video);
            video.play().catch(() => {});
        }
    </script>
</body>
</html>
